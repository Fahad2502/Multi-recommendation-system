<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cross Domain Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
    font-family: 'Poppins', sans-serif;
}

h1, h3, h4 {
    background: linear-gradient(to right, #ff6a00, #ee0979);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

        body {
            background-color: #1a1a1a;
            color: #fff;
        }
        .card-body {
    color: #ffffff;
}

        .card {
            background-color: #2c2c2c;
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }
        .card-body p, .card-body h5 {
    color: #ffffff;
}

        .fade-in {
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.5s ease-in-out forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

        .card:hover {
            transform: scale(1.02);
        }
        .btn-custom {
            background-color: #ff4757;
            border: none;
        }
        .btn-custom:hover {
            background-color: #e84118;
        }
        .card-title {
            color: #ffffff;
            font-weight: bold;
        }
        #book-section h3 {
    margin-bottom: 20px;
  }

  .card img {
    object-fit: cover;
    height: 250px;
  }
        #loaderOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(26, 26, 26, 0.85); /* dark transparent */
  display: none; /* hidden by default */
  z-index: 2000; /* above everything */
}

    </style>
</head>
<body>

<div class="container py-5">
    <h1 class="text-center mb-4">🎬 Cross-Domain Recommender</h1>

    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <input id="searchInput" class="form-control" name="movie" placeholder="Enter a movie name" required>

        </div>
        <div class="col-md-2">
            <button onclick="getRecommendations()" class="btn btn-custom btn-lg w-100">Recommend</button>
            <div id="loadingSpinner" class="position-fixed top-50 start-50 translate-middle" style="display: none; z-index: 2000;">
           <div class="spinner-border text-danger" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

        </div>
    </div>

    <!-- 🎥 Movie Section -->
    <div class="row mt-5">
        <div class="col-12">
            <h3 class="text-light">🎥 Movie Recommendations</h3>
            <div id="movieList" class="row row-cols-1 row-cols-md-3 g-4 mt-2"></div>

        </div>
    </div>

    <!-- 🔁 Divider -->
    <div class="col-12 my-4">
        <hr class="border border-light">
        <h4 class="text-center text-light">🔁 Music Inspired by the Movie</h4>
        <hr class="border border-light">
    </div>

    <!-- 🎵 Music Section -->
    <div class="row mt-3">
        <div class="col-12">
            <h3 class="text-light">🎵 Music Recommendations</h3>
            <div id="musicList" class="row row-cols-1 row-cols-md-2 g-3 mt-2"></div>
        </div>


<!-- Music Genre Filter -->


<!-- Music Cards -->
<div id="musicContainer" class="row row-cols-1 row-cols-md-3 g-4"></div>

    </div>

<!-- 🔁 Divider (BOOKS) — KEEP IT INSIDE the container! -->
<div class="col-12 my-4">
    <hr class="border border-light">
    <div class="d-flex align-items-center justify-content-center">
        <h4 class="text-center text-light mb-0">📚 Books Based on the Movie</h4>
        <span class="badge bg-danger ms-3">New!</span>
    </div>
    <hr class="border border-light">
</div>

<!-- 📖 Book Section -->
<div class="row mt-3">
    <div class="col-12">
        <div class="d-flex align-items-center mb-3">
            <h3 class="text-light mb-0">📖 Book Recommendations</h3>




        </div>
        <div id="bookList" class="row row-cols-1 row-cols-md-3 g-3 mt-2"></div>
    </div>
</div>

</div> <!-- ✅ THIS closes the container at the end, after book section -->




</div>



<!-- Movie Detail Modal -->
<div class="modal fade" id="movieDetailModal" tabindex="-1" aria-labelledby="movieDetailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title" id="movieDetailModalLabel">Movie Details</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="movieDetailContent">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>


</body>
</html>
